services:
  db2:
    build:
      context: ../../images/db2-libfaketime
      args:
        DB2_BASE_IMAGE: ${DB2_BASE_IMAGE:-icr.io/db2_community/db2:11.5.9.0}
        DB2_PLATFORM: ${DB2_PLATFORM:-linux/amd64}
        LIBFAKETIME_VERSION: ${LIBFAKETIME_VERSION:-v0.9.12}
        LIBFAKETIME_COMPILE_CFLAGS: ${LIBFAKETIME_COMPILE_CFLAGS:--DFORCE_MONOTONIC_FIX -DFORCE_PTHREAD_NONVER}
    image: ${DB2_IMAGE_NAME:-docker-cookbook/db2-libfaketime:11.5.9.0}
    platform: ${DB2_PLATFORM:-linux/amd64}
    container_name: ${DB2_CONTAINER_NAME:-db2-libfaketime}
    hostname: ${DB2_HOSTNAME:-db2server}
    privileged: true
    restart: unless-stopped
    ports:
      - "${DB2_HOST_PORT:-50000}:50000"
    environment:
      LICENSE: ${LICENSE:-accept}
      DB2INSTANCE: ${DB2INSTANCE:-db2inst1}
      DB2INST1_PASSWORD: ${DB2INST1_PASSWORD:-change-me-in-local-env}
      DBNAME: ${DBNAME:-testdb}
      BLU: ${BLU:-false}
      ENABLE_ORACLE_COMPATIBILITY: ${ENABLE_ORACLE_COMPATIBILITY:-false}
      UPDATEAVAIL: ${UPDATEAVAIL:-NO}
      TO_CREATE_SAMPLEDB: ${TO_CREATE_SAMPLEDB:-false}
      REPODB: ${REPODB:-false}
      IS_OSXFS: ${IS_OSXFS:-false}
      PERSISTENT_HOME: ${PERSISTENT_HOME:-true}
      HADR_ENABLED: ${HADR_ENABLED:-false}
      ETCD_ENDPOINT: ${ETCD_ENDPOINT:-}
      ETCD_USERNAME: ${ETCD_USERNAME:-}
      ETCD_PASSWORD: ${ETCD_PASSWORD:-}
      TZ: ${TZ:-UTC}
      FAKETIME: ${FAKETIME:-}
      FAKETIME_NO_CACHE: ${FAKETIME_NO_CACHE:-1}
      FAKETIME_DONT_FAKE_MONOTONIC: ${FAKETIME_DONT_FAKE_MONOTONIC:-}
      FAKETIME_TIMESTAMP_FILE: ${FAKETIME_TIMESTAMP_FILE:-}
      FAKETIME_FOLLOW_FILE: ${FAKETIME_FOLLOW_FILE:-}
      FAKETIME_START_AFTER_SECONDS: ${FAKETIME_START_AFTER_SECONDS:-}
      FAKETIME_STOP_AFTER_SECONDS: ${FAKETIME_STOP_AFTER_SECONDS:-}
      FAKETIME_START_AFTER_NUMCALLS: ${FAKETIME_START_AFTER_NUMCALLS:-}
      FAKETIME_STOP_AFTER_NUMCALLS: ${FAKETIME_STOP_AFTER_NUMCALLS:-}
      FAKETIME_DISABLE_SHM: ${FAKETIME_DISABLE_SHM:-}
    volumes:
      - db2-data:/database

volumes:
  db2-data:
